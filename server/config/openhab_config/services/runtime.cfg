# OpenHAB Runtime Configuration
# Deployed by deploy_openhab.py to /etc/openhab/services/runtime.cfg

# JDBC (SQLite) is the default persistence service.
# InfluxDB also runs in parallel via influxdb.persist for Grafana.
# This default is used when persistence queries don't specify a serviceId.
org.openhab.core.persistence:defaultService=jdbc
