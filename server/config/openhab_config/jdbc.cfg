# JDBC Persistence Configuration - SQLite
# Deployed by deploy_openhab.py to /etc/openhab/services/jdbc.cfg

# SQLite database stored in OpenHAB's persistent data directory
url=jdbc:sqlite:/var/lib/openhab/persistence/sqlite/weatherstation.db

# Use item names as table names (easier to query directly)
tableUseRealItemNames=true

# SQLite can only handle one connection at a time
jdbc.maximumPoolSize=1
jdbc.minimumIdle=1
